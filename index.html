<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* ДОЩ СТОВПЧИКІВ */
.rain {
  position: absolute;
  top: -100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 16px;
  opacity: 0.3;
  animation: fall linear infinite;
}

.rain span {
  line-height: 14px;
}

@keyframes fall {
  to {
    transform: translateY(120vh);
  }
}

/* ЦЕНТР */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* ТАЙМЕР */
#timer {
  font-size: 80px;
  color: #ff4da6;
  opacity: 0;
}

/* ТЕКСТ */
#mainText {
  font-size: 60px;
  color: #ff4da6;
  opacity: 0;
  text-align: center;
  transition: opacity 0.5s;
}
</style>
</head>

<body>

<div class="center">
  <div id="timer"></div>
  <div id="mainText"></div>
</div>

<script>
const words = ["Happy", "Birthday", "to", "You"];
const textEl = document.getElementById("mainText");
const timerEl = document.getElementById("timer");

/* СТАРТ */
setTimeout(() => {
  startRain();
  startTimer();
}, 3000);

/* ДОЩ БУКВАМИ */
function createColumn(text) {
  let div = document.createElement("div");
  div.className = "rain";

  const fullText = "happybirthday";

  for (let char of fullText) {
    let span = document.createElement("span");
    span.innerText = char;
    div.appendChild(span);
  }

  div.style.left = Math.random() * 100 + "vw";
  div.style.animationDuration = (4 + Math.random() * 4) + "s";

  const shades = ["#ff4d94", "#cc0066", "#99004d", "#b30059"];
  div.style.color = shades[Math.floor(Math.random() * shades.length)];

  document.body.appendChild(div);
}

function startRain() {
  setInterval(() => {
    createColumn();
  }, 150);
}

/* ТАЙМЕР */
function startTimer() {
  let count = 3;
  timerEl.style.opacity = 1;

  let interval = setInterval(() => {
    timerEl.textContent = count;
    count--;

    if (count < 0) {
      clearInterval(interval);
      timerEl.style.opacity = 0;
      startWords();
    }
  }, 1000);
}

/* СЛОВА */
let index = 0;

function startWords() {
  showWord();
}

function showWord() {
  if (index >= words.length) {
    showFinal();
    return;
  }

  textEl.textContent = words[index];
  textEl.style.opacity = 1;

  setTimeout(() => {
    textEl.style.opacity = 0;
    index++;
    setTimeout(showWord, 500);
  }, 1500);
}

/* ФІНАЛ */
function showFinal() {
  textEl.textContent = "Happy Birthday to You";
  textEl.style.opacity = 1;
}
</script>

</body>
</html>
